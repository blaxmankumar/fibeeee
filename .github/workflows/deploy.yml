name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker Login
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build Docker Image
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fibeeee .

      # 4️⃣ Push Docker Image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fibeeee

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/fibeeee

            # Stop and remove ANY container using port 3000
            docker ps -q --filter "publish=3000" | xargs -r docker stop
            docker ps -aq --filter "publish=3000" | xargs -r docker rm

            # Remove old container if exists
            docker stop fibeeee || true
            docker rm fibeeee || true

            # Run new container
            docker run -d -p 3000:3000 --name fibeeee ${{ secrets.DOCKER_USERNAME }}/fibeeee

            echo "✅ Deployment completed!"
